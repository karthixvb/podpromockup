# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "0757a2f6784196c9cff74aef7fe787b5"
name = "POD Pro Mockup"
application_url = "https://podpromockup.vercel.app"
embedded = false

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/api/shopify/webhooks/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/api/shopify/webhooks/uninstalled"
  topics = [ "app/uninstalled" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_files,write_files,read_products,write_products,read_publications,write_publications"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://podpromockup.vercel.app/api/shopify/auth/callback" ]

[product.metafields.app.design_sku]
type = "single_line_text_field"
name = "POD Design SKU"
description = "Shared design identifier across garment types"

  [product.metafields.app.design_sku.access]
  admin = "merchant_read"
  storefront = "public_read"

[product.metafields.app.product_type_key]
type = "single_line_text_field"
name = "POD Product Type Key"
description = "Machine key e.g. tshirt, hoodie, tank"

  [product.metafields.app.product_type_key.access]
  admin = "merchant_read"
  storefront = "public_read"

[product.metafields.app.category]
type = "single_line_text_field"
name = "POD Category"
description = "mens, womens, kids, baby, unisex"

  [product.metafields.app.category.access]
  admin = "merchant_read"
  storefront = "public_read"

[product.metafields.app.group_id]
type = "single_line_text_field"
name = "POD Group ID"
description = "Links related garment-type products for one design"

  [product.metafields.app.group_id.access]
  admin = "merchant_read"
  storefront = "public_read"

[product.metafields.app.related_products]
type = "json"
name = "POD Related Products"
description = "JSON list of related type products for the storefront carousel"

  [product.metafields.app.related_products.access]
  admin = "merchant_read"
  storefront = "public_read"

[product.metafields.app.color_map]
type = "json"
name = "POD Color Map"
description = "Color name, hex, and primary image for swatches"

  [product.metafields.app.color_map.access]
  admin = "merchant_read"
  storefront = "public_read"
